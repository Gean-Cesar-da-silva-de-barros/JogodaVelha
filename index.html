<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da velha</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-800 text-white h-screen w-screen bodycolor flex justify-center items-center flex-col gap-5 bounce">
    <h1 class="animate-pulse ">Jogo da velha</h1>

    <div class="area bg-sky-500">
        <div data-item="a1" class="item b r"></div>
        <div data-item="a2" class="item b r"></div>
        <div data-item="a3" class="item b"></div>

        <div data-item="b1" class="item b r"></div>
        <div data-item="b2" class="item b r"></div>
        <div data-item="b3" class="item b"></div>

        <div data-item="c1" class="item r"></div>
        <div data-item="c2" class="item r"></div>
        <div data-item="c3" class="item"></div>
    </div>

    <div class="info bg-sky-800 flex gap-5 p-3 rounded">
        <div class="infoitem">
            <div class="infotitulo">A vez é de</div>
            <div class="infocorpo vez">--</div>
        </div>
        <div class="infoitem">
            <div class="infotitulo">Vencedor:</div>
            <div class="infocorpo resultado">--</div>
        </div>
    </div>

    <button
        class="reset cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition duration-300 ease-linear animate-bounce">Resetar</button>

    <script src="script.js"></script>

    <footer class="p-5 text-center text-sm text-gray-400 fixed bottom-0 w-full">
        <p class="">Feito por <a href="https://github.com/Gean-Cesar-da-silva-de-barros"
                class="text-blue-400 hover:underline" target="_blank">Gean cesar</a></p>
    </footer>
</body>

</html>
